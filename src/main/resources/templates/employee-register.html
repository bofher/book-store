<!DOCTYPE html>
<html lang="uk" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{employee.register.page.title}">Create employee</title>
    <th:block th:replace="~{components/ui :: styles}"></th:block>
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{components/ui :: topbar('/employee/register')}"></th:block>
    <main class="page">
        <section class="panel">
            <h1 th:text="#{employee.register.title}">Create employee</h1>

            <div th:if="${employeeRegistered}" class="subtle" th:text="#{employee.register.success}">
                Employee created
            </div>

            <form class="form form--wide" th:action="@{/employee/register}" th:object="${employeeRegistrationRequest}" method="post">
                <div class="field">
                    <label for="email" th:text="#{employee.register.email}">Email</label>
                    <input id="email" type="email" th:field="*{email}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>

                <div class="field">
                    <label for="name" th:text="#{employee.register.name}">Name</label>
                    <input id="name" type="text" th:field="*{name}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>

                <div class="field">
                    <label for="phone" th:text="#{employee.register.phone}">Phone</label>
                    <input id="phone" type="text" th:field="*{phone}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                </div>

                <div class="field">
                    <label for="birthDate" th:text="#{employee.register.birth_date}">Birth date</label>
                    <input id="birthDate" type="date" th:field="*{birthDate}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></p>
                </div>

                <div class="field">
                    <label for="password" th:text="#{employee.register.password}">Password</label>
                    <input id="password" type="password" th:field="*{password}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>

                <div class="field">
                    <label for="confirmPassword" th:text="#{employee.register.confirm_password}">Confirm password</label>
                    <input id="confirmPassword" type="password" th:field="*{confirmPassword}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
                </div>

                <div class="actions">
                    <button class="primary-button" type="submit" th:text="#{employee.register.submit}">Create employee</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
