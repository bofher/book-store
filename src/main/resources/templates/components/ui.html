<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="styles">
    <style>
        :root {
            color-scheme: light;
            --page-bg: #eef2f7;
            --panel-bg: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #d7dee9;
            --accent: #1d4ed8;
            --accent-hover: #1e40af;
            --soft: #f8fafc;
            --danger-bg: #fff1f2;
            --danger-text: #9f1239;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            background: var(--page-bg);
            color: var(--text);
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .app-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 16px 24px;
            background: #0f172a;
            color: #e2e8f0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .topbar__brand {
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 0;
        }

        .brand {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .topbar__nav {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .topbar__nav a {
            color: #cbd5e1;
            font-size: 14px;
        }

        .topbar__nav a.is-active-nav {
            color: #ffffff;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .topbar__tools {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lang-switch {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.03);
        }

        .lang-switch a {
            min-width: 42px;
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid transparent;
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 0;
        }

        .lang-switch a.is-active {
            background: #ffffff;
            color: #0f172a;
        }

        .logout-button {
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.04);
            color: #e2e8f0;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .logout-button:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .page {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 32px 20px 48px;
        }

        .panel {
            width: min(1120px, 100%);
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
            padding: 28px;
        }

        .panel h1 {
            margin: 0 0 20px;
            font-size: 30px;
            line-height: 1.2;
        }

        .subtle {
            margin: 0 0 22px;
            color: var(--muted);
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        .form {
            display: grid;
            gap: 16px;
            width: min(560px, 100%);
        }

        .form--wide {
            width: min(720px, 100%);
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field label {
            font-size: 14px;
            font-weight: 600;
        }

        .field input,
        .field select,
        .field textarea,
        .orders-toolbar input,
        .orders-toolbar select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            font: inherit;
        }

        .field textarea {
            resize: vertical;
            min-height: 108px;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus,
        .orders-toolbar input:focus,
        .orders-toolbar select:focus {
            outline: 2px solid rgba(29, 78, 216, 0.16);
            border-color: var(--accent);
        }

        .field-error,
        .form-error {
            margin: 0;
            color: var(--danger-text);
            background: var(--danger-bg);
            border: 1px solid #fecdd3;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .primary-button {
            border: none;
            border-radius: 10px;
            padding: 11px 16px;
            background: var(--accent);
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .primary-button:hover {
            background: var(--accent-hover);
        }

        .ghost-link {
            color: var(--accent);
            font-weight: 600;
        }

        .kv-list {
            display: grid;
            gap: 12px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .kv-item {
            display: grid;
            gap: 4px;
            padding: 14px 16px;
            background: var(--soft);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .kv-label {
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .kv-value {
            font-weight: 600;
            word-break: break-word;
        }

        .orders-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .books-toolbar {
            display: grid;
            grid-template-columns: minmax(280px, 1.8fr) minmax(180px, 220px) minmax(160px, 200px) auto;
            align-items: end;
            gap: 16px;
            margin-bottom: 20px;
        }

        .books-toolbar__field {
            display: grid;
            gap: 6px;
            min-width: 0;
        }

        .books-toolbar__field .subtle {
            margin: 0;
        }

        .books-toolbar input,
        .books-toolbar select {
            width: 100%;
            min-height: 44px;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            font: inherit;
        }

        .books-toolbar input:focus,
        .books-toolbar select:focus {
            outline: 2px solid rgba(29, 78, 216, 0.16);
            border-color: var(--accent);
        }

        .books-toolbar .primary-button {
            min-height: 44px;
        }

        .orders-list {
            display: grid;
            gap: 16px;
        }

        .order-card {
            display: grid;
            gap: 14px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--soft);
        }

        .order-card__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .order-card__title {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .order-card__title strong {
            font-size: 16px;
            line-height: 1.3;
        }

        .order-card__meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px 20px;
        }

        .meta-item {
            display: grid;
            gap: 4px;
            min-width: 0;
        }

        .meta-label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .meta-value {
            font-weight: 600;
            word-break: break-word;
        }

        .order-items {
            display: grid;
            gap: 8px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            padding: 10px 12px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .order-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .badge--pending {
            background: #fef3c7;
            color: #92400e;
        }

        .badge--confirmed {
            background: #dcfce7;
            color: #166534;
        }

        .badge--canceled {
            background: #fee2e2;
            color: #991b1b;
        }

        .pagination-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
    </style>
</th:block>

<header class="topbar" th:fragment="topbar(currentPath)">
    <div class="topbar__brand">
        <a sec:authorize="isAuthenticated()" class="brand" th:href="@{|/?lang=${#locale.language}|}" th:text="#{app.name}">Book Store</a>
        <span sec:authorize="isAnonymous()" class="brand" th:text="#{app.name}">Book Store</span>
        <nav class="topbar__nav">
            <a sec:authorize="isAuthenticated()"
               th:href="@{|/books?lang=${#locale.language}|}"
               th:classappend="${currentPath == '/' or #strings.startsWith(currentPath, '/books')} ? ' is-active-nav' : ''"
               th:text="#{nav.books}">Books</a>
            <a sec:authorize="hasRole('CLIENT')"
               th:href="@{|/cart?lang=${#locale.language}|}"
               th:classappend="${#strings.startsWith(currentPath, '/cart')} ? ' is-active-nav' : ''"
               th:text="#{nav.cart}">Cart</a>
            <a sec:authorize="hasRole('CLIENT')"
               th:href="@{|/client/orders?lang=${#locale.language}|}"
               th:classappend="${#strings.startsWith(currentPath, '/client/orders')} ? ' is-active-nav' : ''"
               th:text="#{nav.my_orders}">My orders</a>
            <a sec:authorize="hasRole('EMPLOYEE')"
               th:href="@{|/employee/clients?lang=${#locale.language}|}"
               th:classappend="${#strings.startsWith(currentPath, '/employee/clients')} ? ' is-active-nav' : ''"
               th:text="#{nav.clients}">Clients</a>
            <a sec:authorize="hasRole('EMPLOYEE')"
               th:href="@{|/employee/orders?lang=${#locale.language}|}"
               th:classappend="${#strings.startsWith(currentPath, '/employee/orders')} ? ' is-active-nav' : ''"
               th:text="#{nav.orders}">Orders</a>
            <a sec:authorize="hasRole('EMPLOYEE')"
               th:href="@{|/employee/register?lang=${#locale.language}|}"
               th:classappend="${#strings.startsWith(currentPath, '/employee/register')} ? ' is-active-nav' : ''"
               th:text="#{nav.employee_register}">Add employee</a>
            <a sec:authorize="isAuthenticated()"
               th:href="@{|/profile?lang=${#locale.language}|}"
               th:classappend="${#strings.startsWith(currentPath, '/profile')} ? ' is-active-nav' : ''"
               th:text="#{nav.profile}">Profile</a>
        </nav>
    </div>
    <div class="topbar__tools">
        <div class="lang-switch">
            <a th:href="@{|${currentPath}?lang=uk|}"
               th:classappend="${#locale.language == 'uk'} ? ' is-active' : ''"
               th:text="#{lang.ua}">UA</a>
            <a th:href="@{|${currentPath}?lang=en|}"
               th:classappend="${#locale.language == 'en'} ? ' is-active' : ''"
               th:text="#{lang.en}">EN</a>
        </div>
        <form sec:authorize="isAuthenticated()" th:action="@{/auth/logout}" method="post">
            <button class="logout-button" type="submit" th:text="#{nav.logout}">Logout</button>
        </form>
    </div>
</header>
</body>
</html>
